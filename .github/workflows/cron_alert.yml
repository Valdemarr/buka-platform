name: Run daily CVR alert

on:
  schedule:
    - cron: '0 5 * * 1-5'   # 07:00 CEST (UTC+2), weekdays
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan buka.dk >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run cvr_alert.py on server
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no buka.dk@buka.dk bash -s << 'SCRIPT'
            export PATH="$HOME/.local/bin:$PATH"
            export RESEND_API_KEY_EXTERNAL="${{ secrets.RESEND_API_KEY_EXTERNAL }}"
            export UNSUB_SECRET="${{ secrets.UNSUB_SECRET }}"
            export BUKA_URL="https://buka.dk"
            cd ~/buka
            python3 cvr_alert.py >> ~/buka/alert.log 2>&1
            echo "Exit: $?"
            tail -5 ~/buka/alert.log
          SCRIPT
