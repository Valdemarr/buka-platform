name: Deploy BUKA to buka.dk

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan buka.dk >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload and deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no buka.dk@buka.dk "mkdir -p ~/buka/templates"
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no app.py crawler.py buka.dk@buka.dk:~/buka/
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no templates/*.html buka.dk@buka.dk:~/buka/templates/

      - name: Configure and start app
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no buka.dk@buka.dk << 'SSHEOF'
          export PATH="$HOME/.local/bin:$PATH"
          cd ~/buka

          echo "=== Python packages ==="
          python3 -m pip install flask gunicorn --user --quiet 2>&1 | tail -3
          python3 -c "import flask; print('flask', flask.__version__)"

          echo "=== Init DB ==="
          python3 -c "from app import init_db; init_db(); print('DB OK')"

          echo "=== Restart app ==="
          pkill -f "gunicorn.*app" 2>/dev/null || true
          sleep 1
          SECRET_KEY="buka-$(date +%s)" nohup gunicorn \
            --bind 0.0.0.0:5000 --workers 2 --daemon \
            --access-logfile ~/buka/access.log \
            --error-logfile ~/buka/error.log \
            app:app
          sleep 3
          curl -s http://localhost:5000/ | grep -o '<title>.*</title>'

          echo "=== Find web root ==="
          for DIR in /var/www/buka.dk /var/www/html ~/www ~/public_html; do
            if [ -d "$DIR" ]; then echo "Found: $DIR"; ls "$DIR" | head -5; WEBROOT="$DIR"; fi
          done

          echo "=== Write .htaccess proxy ==="
          if [ -n "$WEBROOT" ]; then
            cat > "$WEBROOT/.htaccess" << 'HTEOF'
RewriteEngine On
RewriteRule ^(.*)$ http://127.0.0.1:5000/$1 [P,L]
ProxyPassReverse / http://127.0.0.1:5000/
HTEOF
            echo "Wrote .htaccess to $WEBROOT"
            cat "$WEBROOT/.htaccess"
          fi

          echo "=== Crawler ==="
          COUNT=$(python3 -c "import sqlite3; db=sqlite3.connect('buka.db'); print(db.execute('SELECT COUNT(*) FROM companies').fetchone()[0])" 2>/dev/null || echo 0)
          echo "Companies: $COUNT"
          pkill -f "crawler.py" 2>/dev/null || true
          nohup python3 crawler.py --limit 5000 > ~/buka/crawler.log 2>&1 &
          echo "Crawler PID: $!"
          SSHEOF
