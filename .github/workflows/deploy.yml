name: Deploy BUKA to buka.dk

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Get host keys
          ssh-keyscan -p 22 buka.dk >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -p 22 93.191.156.89 >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSH key fingerprint:"
          ssh-keygen -l -f ~/.ssh/id_ed25519

      - name: Test SSH (try multiple usernames)
        run: |
          # Simply.com SSH usernames: email, domain, account number
          for USER in "esben@buka.dk" "buka.dk" "S630980" "esben"; do
            echo "=== Trying user: $USER ==="
            ssh -i ~/.ssh/id_ed25519               -o StrictHostKeyChecking=no               -o ConnectTimeout=10               -o BatchMode=yes               -v               $USER@buka.dk "echo SSH_OK; pwd" 2>&1 | tail -5
            echo ""
          done

      - name: Deploy (once SSH works)
        if: false
        run: echo "deployment step placeholder"
