name: Deploy BUKA to buka.dk

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 buka.dk >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check server environment
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no buka.dk@buka.dk \
            "echo 'User:' $(whoami); echo 'Home:' $HOME; pwd; ls -la; python3 --version 2>/dev/null || echo 'no python3'; which pip3 2>/dev/null || echo 'no pip3'"

      - name: Create app directory and upload files
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no buka.dk@buka.dk \
            "mkdir -p ~/buka/templates ~/buka/static"
          
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            app.py crawler.py deploy.sh \
            buka.dk@buka.dk:~/buka/
          
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            templates/*.html \
            buka.dk@buka.dk:~/buka/templates/

      - name: Install dependencies and start app
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no buka.dk@buka.dk << 'SSHEOF'
          cd ~/buka
          echo "=== Setting up Python environment ==="
          python3 -m venv venv 2>&1 | tail -2
          venv/bin/pip install flask gunicorn --quiet 2>&1 | tail -3
          
          echo "=== Initializing database ==="
          venv/bin/python -c "from app import init_db; init_db(); print('DB OK')"
          
          echo "=== Starting application ==="
          pkill -f "gunicorn.*app:app" 2>/dev/null || true
          sleep 1
          
          SECRET_KEY="buka-$(openssl rand -hex 16 2>/dev/null || date +%s)" \
          nohup venv/bin/gunicorn \
            --bind 0.0.0.0:5000 \
            --workers 2 \
            --daemon \
            --access-logfile ~/buka/access.log \
            --error-logfile ~/buka/error.log \
            app:app
          
          sleep 4
          echo "=== Health check ==="
          curl -s http://localhost:5000/ | grep -o '<title>.*</title>' || echo "App not responding on 5000"
          
          echo "=== Starting crawler ==="
          COUNT=$(venv/bin/python -c "import sqlite3; db=sqlite3.connect('buka.db'); print(db.execute('SELECT COUNT(*) FROM companies').fetchone()[0])" 2>/dev/null || echo 0)
          echo "Companies: $COUNT"
          if [ "$COUNT" -lt 200 ]; then
            nohup venv/bin/python crawler.py --limit 3000 > ~/buka/crawler.log 2>&1 &
            echo "Crawler started PID $!"
          fi
          SSHEOF
