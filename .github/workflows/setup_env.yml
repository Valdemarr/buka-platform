name: Write server env

on:
  workflow_dispatch:
    inputs:
      resend_key:
        description: RESEND_API_KEY_EXTERNAL value
        required: true
      unsub_secret:
        description: UNSUB_SECRET value
        required: false
        default: buka-unsub-2026
      telegram_token:
        description: TELEGRAM_BOT_TOKEN value
        required: false
        default: ''
      telegram_chat:
        description: TELEGRAM_CHAT_ID value
        required: false
        default: ''
      cvrdev_key:
        description: CVRDEV_API_KEY value (cvr.dev API key)
        required: false
        default: ''

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan buka.dk >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Build and copy .env
        env:
          RESEND_KEY: ${{ github.event.inputs.resend_key }}
          UNSUB_SEC: ${{ github.event.inputs.unsub_secret }}
          TG_TOKEN: ${{ github.event.inputs.telegram_token }}
          TG_CHAT: ${{ github.event.inputs.telegram_chat }}
          CVRDEV_KEY: ${{ github.event.inputs.cvrdev_key }}
        run: |
          printf 'RESEND_API_KEY_EXTERNAL=%s\nUNSUB_SECRET=%s\nBUKA_URL=https://buka.dk\nTELEGRAM_BOT_TOKEN=%s\nTELEGRAM_CHAT_ID=%s\nCVRDEV_API_KEY=%s\n' \
            "${RESEND_KEY}" "${UNSUB_SEC}" "${TG_TOKEN}" "${TG_CHAT}" "${CVRDEV_KEY}" > /tmp/buka.env
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no /tmp/buka.env buka.dk@buka.dk:~/buka/.env
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no buka.dk@buka.dk \
            "chmod 600 ~/buka/.env && echo '.env written:' && wc -l ~/buka/.env"
