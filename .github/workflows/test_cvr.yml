name: Test CVR server access

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan buka.dk >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test CVR sources
        run: >
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no buka.dk@buka.dk
          "echo '=== distribution.virk.dk ===' &&
          curl -s -m 8 -o /tmp/virktest.txt https://distribution.virk.dk/cvr-permanent/virksomhed/_search?size=1 2>&1;
          echo 'Exit:' $? && head -c 200 /tmp/virktest.txt || echo TIMEOUT;
          echo '=== cvrapi high range ===';
          curl -s -m 5 'https://cvrapi.dk/api?vat=44600000&country=dk' | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("startdate",d.get("error","?")))'
          2>/dev/null || echo FAIL"
