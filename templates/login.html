{% extends "base.html" %}
{% block title %}Log ind — BUKA{% endblock %}
{% block head %}
<style>
.auth-wrap{max-width:420px;margin:60px auto}
.auth-wrap h1{font-size:1.6rem;font-weight:900;margin-bottom:6px}
.auth-wrap .sub{color:var(--gray);font-size:.9rem;margin-bottom:28px}
label{display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:4px;margin-top:14px}
input{width:100%;padding:.8rem 1rem;border:1.5px solid var(--border);border-radius:8px;font-size:.95rem;font-family:inherit;background:#fff;transition:border .2s}
input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.btn-full{width:100%;padding:.9rem;font-size:1rem;margin-top:20px;border-radius:10px}
.link-row{text-align:center;font-size:.85rem;color:var(--gray);margin-top:16px}
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="card">
    <h1>Log ind</h1>
    <p class="sub">Velkommen tilbage</p>
    <form method="POST">
      <label>Email</label>
      <input name="email" type="email" placeholder="din@email.dk" required autofocus>
      <label>Adgangskode</label>
      <input name="password" type="password" placeholder="Din adgangskode" required>
      <button type="submit" class="btn btn-full">Log ind →</button>
    </form>
    <p class="link-row">Ingen konto? <a href="/register">Opret konto gratis</a></p>
  </div>
</div>
{% endblock %}
