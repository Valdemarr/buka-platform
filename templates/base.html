<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}BUKA{% endblock %}</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#2563EB;--blue-d:#1d4ed8;--gray:#6B7280;--bg:#F3F4F6;--border:#e5e7eb}
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:#111;min-height:100vh}
    a{color:var(--blue);text-decoration:none}
    nav{background:#fff;border-bottom:1px solid var(--border);padding:.85rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
    .logo{font-weight:900;font-size:1.4rem;letter-spacing:-1px;color:#111}
    .logo em{color:var(--blue);font-style:normal}
    .nav-links{display:flex;gap:1.5rem;align-items:center;font-size:.88rem}
    .nav-links a{color:var(--gray)}
    .btn{display:inline-block;background:var(--blue);color:#fff;padding:.6rem 1.4rem;border-radius:8px;font-weight:700;font-size:.88rem;border:none;cursor:pointer;transition:background .2s}
    .btn:hover{background:var(--blue-d);color:#fff}
    .btn-sm{padding:.45rem 1rem;font-size:.8rem}
    .btn-outline{background:transparent;border:1.5px solid var(--blue);color:var(--blue)}
    .btn-outline:hover{background:var(--blue);color:#fff}
    .flash-error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;padding:.75rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.88rem}
    .flash-success{background:#f0fdf4;border:1px solid #86efac;color:#15803d;padding:.75rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:.88rem}
    main{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
    .card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:1.5rem}
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="logo">BU<em>K</em>A</a>
  <div class="nav-links">
    {% if session.user_id %}
      <a href="/dashboard">Dashboard</a>
      <a href="/logout" class="btn btn-sm btn-outline">Log ud</a>
    {% else %}
      <a href="/login">Log ind</a>
      <a href="/register" class="btn btn-sm">Kom i gang →</a>
    {% endif %}
  </div>
</nav>

<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
